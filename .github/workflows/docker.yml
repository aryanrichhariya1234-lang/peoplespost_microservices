name: CI/CD Pipeline

on:
  push:
    branches: [master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Setup Go
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"

      # 3. Run backend tests
      - name: Run tests
        working-directory: ./peoplepost
        run: go test ./...

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 5. Build backend image
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/people-post-backend ./peoplepost

      # 6. Push backend image
      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/people-post-backend

      # 7. Build frontend image
      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/people-post-frontend ./peoplepostF

      # 8. Push frontend image
      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/people-post-frontend
